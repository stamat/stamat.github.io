<footer style="border-top: gray 1px dashed; padding-top: 8px; margin-top: 24px;">
  <nav class="padded-text menu">
    <ul>
      {% for link in social %}
        <li>
          <a href="{% if 'http' in link.url %}{% else %}{{ relativePathPrefix }}{% endif %}{{ link.url }}" class="{% if link.url == page.url %}text-underline{% else %}text-none{% endif %} text-bold d-inline-block ml-lg-16 font-heading">{{ link.title }}</a>
        </li>
        {% if not loop.last %}
          <li class="menu-separator" aria-hidden="true"> | </li>
        {% endif %}
      {% endfor %}
    </ul>
  </nav>
</footer>
<br>
<p class="small gray">
  Built with <a href="https://www.npmjs.com/package/poops">poops</a>, hosted on <a href="https://pages.github.com/">GitHub Pages</a>.
</p>
