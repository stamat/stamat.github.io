<header style="margin-bottom: 24px;">
  <div style="display: flex; align-items: center;">
    <a href="{{ relativePathPrefix }}">//stamat.info</a>
    <date-time live style="margin-left: auto; color: gray"></date-time>
  </div>
  <hr class="even-less-margin solid white">
  <nav class="padded-text menu" style="display: flex; justify-content: right;">
    <ul>
      {% for link in nav %}
        <li>
          <a href="{% if 'http' in link.url %}{% else %}{{ relativePathPrefix }}{% endif %}{{ link.url }}" class="{% if link.url == page.url %}text-underline{% else %}text-none{% endif %} text-bold d-inline-block ml-lg-16 font-heading">{{ link.title }}</a>
        </li>
        {% if not loop.last %}
          <li class="menu-separator" aria-hidden="true"> | </li>
        {% endif %}
      {% endfor %}
    </ul>
  </nav>
</header>
